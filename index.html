<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi Interaktif Magnitudo Bintang</title>
    <style>
        /* --- Gaya CSS (Biar Tampilannya Bagus & Dark Mode) --- */
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161b22;
            --text-color: #ecf0f1;
            --accent-color: #00d2ff;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 30px;
        }

        /* --- Area Animasi Visual --- */
        #visual-canvas {
            width: 100%;
            height: 300px;
            background: radial-gradient(circle at center, #1a253a 0%, #05080f 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        /* Bumi di kiri */
        #earth {
            position: absolute;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #2ecc71, #27ae60 40%, #2980b9);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.5);
            z-index: 10;
        }
        
        #earth-label {
            position: absolute;
            left: 45px;
            top: calc(50% + 30px);
            font-size: 12px;
            color: #aaa;
        }

        /* Bintang yang bisa bergerak */
        #star {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            transition: left 0.1s ease-out, background-color 0.2s, box-shadow 0.2s;
            /* Default area (Matahari) */
            left: 50%; /* Ini akan diubah JS berdasarkan jarak */
            width: 30px;
            height: 30px;
            background-color: #fff176; /* Kuning Matahari */
            box-shadow: 0 0 40px #fff176, 0 0 80px #ffb300;
        }

        /* Garis bantu jarak standar 10 parsec */
        #standard-line {
            position: absolute;
            top: 0;
            height: 100%;
            width: 2px;
            background-color: rgba(255, 255, 255, 0.2);
            border-style: dashed;
            z-index: 1;
        }
        #standard-label {
            position: absolute;
            top: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            transform: translateX(-50%);
        }

        /* --- Area Kontrol (Slider) --- */
        .controls-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            margin-bottom: 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .current-value {
            color: var(--accent-color);
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        /* --- Area Hasil (Kartu Data) --- */
        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
            border-top: 4px solid transparent;
            transition: transform 0.2s;
        }
        
        .card:hover {
            transform: translateY(-3px);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: #aaa;
        }

        .card .value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card .unit {
            font-size: 0.9rem;
            color: #888;
        }

        /* Warna spesifik kartu */
        #card-m { border-top-color: #e74c3c; } /* Merah */
        #card-M { border-top-color: #2ecc71; } /* Hijau */
        #card-bol { border-top-color: #f1c40f; } /* Kuning */
        #card-color { border-top-color: #3498db; } /* Biru */

        .color-box {
            width: 50px;
            height: 20px;
            margin: 10px auto;
            border-radius: 4px;
            border: 1px solid #444;
        }

    </style>
</head>
<body>

    <div class="main-container">
        <h1>✨ Animasi Fotometri Bintang</h1>

        <!-- 1. AREA VISUALISASI -->
        <div id="visual-canvas">
            <div id="standard-line"></div>
            <div id="standard-label">Jarak Standar<br>(10 pc)</div>
            
            <div id="earth"></div>
            <div id="earth-label">Bumi</div>
            
            <div id="star"></div>
        </div>

        <!-- 2. AREA KONTROL (SLIDER) -->
        <div class="controls-container">
            <!-- Jarak -->
            <div class="control-group">
                <label>Jarak (d): <span><span id="val-distance" class="current-value">10</span> parsec</span></label>
                <input type="range" id="slider-distance" min="1" max="100" step="1" value="10">
            </div>
            <!-- Luminositas Asli -->
            <div class="control-group">
                <label>Luminositas Asli (L): <span><span id="val-luminosity" class="current-value">1</span> L<sub>☉</sub> (Matahari)</span></label>
                <input type="range" id="slider-luminosity" min="0.1" max="100" step="0.1" value="1">
            </div>
            <!-- Suhu -->
            <div class="control-group">
                <label>Suhu Permukaan (T): <span><span id="val-temp" class="current-value">5778</span> Kelvin</span></label>
                <input type="range" id="slider-temp" min="3000" max="20000" step="100" value="5778">
            </div>
        </div>

        <!-- 3. AREA HASIL PERHITUNGAN -->
        <div class="results-container">
            <!-- Magnitudo Semu -->
            <div class="card" id="card-m">
                <h3>Magnitudo Semu (m)</h3>
                <div class="value" id="out-m">4.83</div>
                <div class="unit">"Seberapa terang dari Bumi"</div>
            </div>
            <!-- Magnitudo Mutlak -->
            <div class="card" id="card-M">
                <h3>Magnitudo Mutlak (M)</h3>
                <div class="value" id="out-M">4.83</div>
                <div class="unit">"Terang asli di 10 parsec"</div>
            </div>
            <!-- Magnitudo Bolometrik -->
            <div class="card" id="card-bol">
                <h3>M. Bolometrik Mutlak (M<sub>bol</sub>)</h3>
                <div class="value" id="out-bol">4.74</div>
                <div class="unit">"Total energi semua spektrum"</div>
            </div>
            <!-- Tipe Spektrum / Warna -->
            <div class="card" id="card-color">
                <h3>Warna & Tipe</h3>
                <div class="color-box" id="out-color-box"></div>
                <div class="value" style="font-size: 1.5rem;" id="out-spektrum">G2V</div>
                <div class="unit" id="out-b-v">B-V: +0.65</div>
            </div>
        </div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC (Otak Simulasi) ---

        // Konsep Dasar: Skala logaritmik, angka makin kecil = makin terang.
        // Patokan: Matahari pada d=10pc.
        const M_v_sun = 4.83;   // Magnitudo Mutlak Visual Matahari
        const M_bol_sun = 4.74; // Magnitudo Mutlak Bolometrik Matahari

        // DOM Elements
        const sDist = document.getElementById('slider-distance');
        const sLum = document.getElementById('slider-luminosity');
        const sTemp = document.getElementById('slider-temp');

        const vDist = document.getElementById('val-distance');
        const vLum = document.getElementById('val-luminosity');
        const vTemp = document.getElementById('val-temp');

        const elStar = document.getElementById('star');
        const elCanvas = document.getElementById('visual-canvas');
        const elStdLine = document.getElementById('standard-line');
        const elStdLabel = document.getElementById('standard-label');

        // Fungsi utama untuk memperbarui segalanya
        function updateAll() {
            // 1. Ambil nilai input
            const d = parseFloat(sDist.value);
            const L = parseFloat(sLum.value);
            const T = parseInt(sTemp.value);

            // 2. Update teks di slider
            vDist.textContent = d;
            vLum.textContent = L;
            vTemp.textContent = T;

            // --- A. PERHITUNGAN MATEMATIKA ---

            // Hitung Magnitudo Mutlak Visual (M) berdasarkan Luminositas (L)
            // Rumus: M = M_sun - 2.5 * log10(L)
            const M = M_v_sun - 2.5 * Math.log10(L);

            // Hitung Magnitudo Semu (m) menggunakan Modulus Jarak
            // Rumus: m = M + 5 * log10(d) - 5
            const m = M + 5 * Math.log10(d) - 5;

            // Hitung Magnitudo Bolometrik Mutlak (M_bol)
            const M_bol = M_bol_sun - 2.5 * Math.log10(L);

            // Tentukan Indeks Warna (B-V) dan Tipe Spektrum sederhana berdasarkan Suhu
            let spektrum = "";
            let color = "";
            let bv = 0;

            if (T >= 10000) { spektrum = "O/B (Sangat Panas)"; color = "#90caf9"; bv = -0.3; } // Biru
            else if (T >= 7500) { spektrum = "A (Panas)"; color = "#e3f2fd"; bv = 0.0; } // Putih
            else if (T >= 6000) { spektrum = "F"; color = "#f9fbe7"; bv = 0.3; } // Putih Kuning
            else if (T >= 5200) { spektrum = "G (Matahari)"; color = "#fff176"; bv = 0.65; } // Kuning
            else if (T >= 3700) { spektrum = "K"; color = "#ffb74d"; bv = 1.0; } // Jingga
            else { spektrum = "M (Dingin)"; color = "#ef5350"; bv = 1.5; } // Merah

            // Khusus default Matahari
            if (T === 5778 && L === 1) spektrum = "G2V (Matahari)";

            // --- B. UPDATE TAMPILAN DATA (Kartu) ---
            
            // Format angka agar enak dibaca (2 desimal)
            document.getElementById('out-m').textContent = m.toFixed(2);
            document.getElementById('out-M').textContent = M.toFixed(2);
            document.getElementById('out-bol').textContent = M_bol.toFixed(2);
            document.getElementById('out-spektrum').textContent = spektrum;
            document.getElementById('out-b-v').textContent = `B-V: ${bv.toFixed(2)}`;
            document.getElementById('out-color-box').style.backgroundColor = color;


            // --- C. UPDATE ANIMASI VISUAL ---

            // 1. Posisi Jarak (Visualisasi Logaritmik sederhana agar muat di kanvas)
            // Bumi di 50px. Jarak 1pc = dekat Bumi, 100pc = kanan kanvas.
            const canvasWidth = elCanvas.offsetWidth;
            const startX = 70; // Sedikit di kanan Bumi
            const endX = canvasWidth - 50;
            // Gunakan log jarak agar pergerakan slider terasa halus tapi merepresentasikan skala besar
            const logD = Math.log10(d); // 0 (1pc) sampai 2 (100pc)
            const newLeft = startX + (logD / 2) * (endX - startX);
            elStar.style.left = `${newLeft}px`;

            // Posisi garis standar 10pc (log10(10) = 1)
            const stdLeft = startX + (1 / 2) * (endX - startX);
            elStdLine.style.left = `${stdLeft}px`;
            elStdLabel.style.left = `${stdLeft}px`;

            // 2. Warna dan Cahaya (Bloom) Bintang berdasarkan Suhu
            elStar.style.backgroundColor = color;
            
            // Efek pijar (box-shadow) dipengaruhi Suhu dan Luminositas
            const bloomSize = Math.max(20, Math.min(100, 20 + Math.sqrt(L) * 3));
            elStar.style.boxShadow = `0 0 ${bloomSize}px ${color}, 0 0 ${bloomSize/2}px #fff`;

            // 3. Ukuran Visual Bintang (m) - Semakin redup (m besar), ukuran visual makin kecil
            // Ini cuma trik visual agar mata paham "keterangan semu"
            // Kita balik logikanya: m kecil (terang) -> ukuran besar. m besar (redup) -> ukuran kecil.
            // Batasi ukuran antara 5px sampai 50px
            let visualSize = 40 - (m * 2); 
            visualSize = Math.max(5, Math.min(60, visualSize));
            elStar.style.width = `${visualSize}px`;
            elStar.style.height = `${visualSize}px`;

        }

        // Event Listeners untuk mendeteksi perubahan slider
        sDist.addEventListener('input', updateAll);
        sLum.addEventListener('input', updateAll);
        sTemp.addEventListener('input', updateAll);

        // Jalankan sekali saat loading awal agar sinkron
        window.addEventListener('resize', updateAll); // Update jika ukuran browser berubah
        updateAll();

    </script>
</body>
</html>
